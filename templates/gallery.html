{% extends "index.html" %}

{% block title %}Photo Gallery - Anubhuti | Dev Sanskriti Vishwavidyalaya{% endblock %}

{% block content %}
<section class="content-section">
  <div class="section-header">
    <h2 data-i18n="galleryTitle">Internship Photo Gallery</h2>
    <p class="subtitle" data-i18n="gallerySubtitle">Explore photos from internship experiences across our community</p>
  </div>

  <div style="margin-bottom: 30px; display: flex; gap: 12px; flex-wrap: wrap; justify-content: center;">
    <button class="gallery-filter-btn active" data-i18n="galleryAllPhotos" onclick="filterGallery('all')" style="padding: 8px 16px; border: 2px solid var(--line); background: var(--brand); color: white; border-radius: var(--radius-sm); cursor: pointer; font-weight: 600;">All Photos</button>
    <button class="gallery-filter-btn" data-i18n="galleryProfilePhotos" onclick="filterGallery('profiles')" style="padding: 8px 16px; border: 2px solid var(--line); background: var(--surface); color: var(--ink); border-radius: var(--radius-sm); cursor: pointer; font-weight: 600;">Profile Photos</button>
    <button class="gallery-filter-btn" data-i18n="galleryExperiencePhotos" onclick="filterGallery('experiences')" style="padding: 8px 16px; border: 2px solid var(--line); background: var(--surface); color: var(--ink); border-radius: var(--radius-sm); cursor: pointer; font-weight: 600;">Experience Photos</button>
  </div>

  <div id="gallery-grid" class="gallery-grid" style="
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
    gap: 16px;
    margin-bottom: 40px;
  ">
    <!-- Loaded dynamically from API -->
  </div>

  <div id="gallery-modal" class="modal" style="display: none;">
    <div class="modal-content gallery-modal-content" style="
      max-width: 90%;
      max-height: 90vh;
      display: flex;
      flex-direction: column;
      background: rgba(0, 0, 0, 0.95);
      border: none;
      border-radius: 0;
      padding: 0;
    ">
      <div style="display: flex; justify-content: space-between; align-items: center; padding: 20px; border-bottom: 1px solid rgba(255,255,255,0.1);">
        <h3 id="modal-title" style="margin: 0; color: white; font-size: 1.2rem;"></h3>
        <button class="modal-close" onclick="closeGalleryModal()" style="background: none; border: none; color: white; font-size: 32px; cursor: pointer; padding: 0;">&times;</button>
      </div>
      
      <div style="flex: 1; display: flex; align-items: center; justify-content: center; overflow: hidden;">
        <div style="position: relative; width: 100%; height: 100%; display: flex; align-items: center; justify-content: center;">
          <img id="modal-image" src="" alt="Photo" style="max-width: 100%; max-height: 100%; object-fit: contain;" />
        </div>
      </div>

      <div style="padding: 20px; border-top: 1px solid rgba(255,255,255,0.1); background: rgba(0,0,0,0.5);">
        <p id="modal-info" style="margin: 0; color: #ccc; font-size: 0.95rem;"></p>
      </div>

      <div style="display: flex; justify-content: space-between; gap: 10px; padding: 10px;">
        <button onclick="prevGalleryImage()" style="flex: 1; padding: 10px; background: rgba(255,255,255,0.1); color: white; border: 1px solid rgba(255,255,255,0.2); border-radius: var(--radius-sm); cursor: pointer; font-size: 0.9rem;">← Previous</button>
        <button onclick="nextGalleryImage()" style="flex: 1; padding: 10px; background: rgba(255,255,255,0.1); color: white; border: 1px solid rgba(255,255,255,0.2); border-radius: var(--radius-sm); cursor: pointer; font-size: 0.9rem;">Next →</button>
      </div>
    </div>
  </div>
</section>

<style>
  .gallery-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
    gap: 16px;
  }

  .gallery-item {
    position: relative;
    aspect-ratio: 1;
    border-radius: var(--radius-sm);
    overflow: hidden;
    cursor: pointer;
    background: var(--surface);
    transition: transform 0.3s ease, box-shadow 0.3s ease;
  }

  .gallery-item:hover {
    transform: scale(1.05);
    box-shadow: var(--shadow-lg);
  }

  .gallery-item img {
    width: 100%;
    height: 100%;
    object-fit: cover;
  }

  /* Removed overlay labels: names, organizations, and type badges */

  @media (max-width: 768px) {
    .gallery-grid {
      grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
      gap: 12px;
    }

    .gallery-modal-content {
      max-width: 95% !important;
      max-height: 95vh !important;
    }
  }
</style>

<script>
  let allGalleryPhotos = [];
  let filteredPhotos = [];
  let currentFilter = 'all';
  let currentModalIndex = 0;

  (async function() {
    try {
      const res = await fetch('/api/bootstrap', { credentials: 'include' });
      const bootstrap = await res.json();

      const submissions = Array.isArray(bootstrap.submissions) ? bootstrap.submissions : [];
      const approved = submissions.filter(s => s && s.status === 'approved');

      // Build gallery from all approved submissions
      approved.forEach(submission => {
        // Add profile photo
        if (submission.avatarUrl || submission.thumbnail || submission.photo) {
          const profilePhoto = submission.avatarUrl || submission.thumbnail || submission.photo;
          allGalleryPhotos.push({
            src: profilePhoto,
            studentName: submission.studentName || 'Student',
            organization: submission.organization || 'Organization',
            type: 'profile',
            submissionId: submission.id
          });
        }

        // Add gallery photos
        if (Array.isArray(submission.gallery) && submission.gallery.length > 0) {
          submission.gallery.forEach(photo => {
            allGalleryPhotos.push({
              src: photo,
              studentName: submission.studentName || 'Student',
              organization: submission.organization || 'Organization',
              type: 'experience',
              submissionId: submission.id
            });
          });
        }
      });

      filteredPhotos = [...allGalleryPhotos];
      renderGallery();
    } catch (err) {
      console.error('Error loading gallery:', err);
      document.getElementById('gallery-grid').innerHTML = '<p style="grid-column: 1/-1; text-align: center; color: var(--muted); padding: 40px;">Error loading gallery photos.</p>';
    }
  })();

  function renderGallery() {
    const container = document.getElementById('gallery-grid');

    if (filteredPhotos.length === 0) {
      container.innerHTML = '<p style="grid-column: 1/-1; text-align: center; color: var(--muted); padding: 40px;">No photos available yet.</p>';
      return;
    }

    container.innerHTML = filteredPhotos.map((photo, index) => `
      <div class="gallery-item" onclick="openGalleryModal(${index})">
        <img src="${escapeHtml(getPhotoSrc(photo.src))}" alt="Photo ${index + 1}" />
      </div>
    `).join('');
  }

  function getPhotoSrc(src) {
    if (!src) return '/assets/Dev_Sanskriti_Vishwavidyalaya.png';
    if (/^(https?:)?\/\//.test(src) || src.startsWith('data:') || src.startsWith('blob:') || src.startsWith('/api/uploads/') || src.startsWith('/static/')) {
      return src;
    }
    return `/api/uploads/avatars/${encodeURIComponent(src)}`;
  }

  function filterGallery(filter) {
    currentFilter = filter;
    currentModalIndex = 0;

    // Update button styles
    document.querySelectorAll('.gallery-filter-btn').forEach(btn => {
      btn.style.background = btn.onclick.toString().includes(`'${filter}'`) ? 'var(--brand)' : 'var(--surface)';
      btn.style.color = btn.onclick.toString().includes(`'${filter}'`) ? 'white' : 'var(--ink)';
    });

    // Filter photos
    if (filter === 'all') {
      filteredPhotos = [...allGalleryPhotos];
    } else if (filter === 'profiles') {
      filteredPhotos = allGalleryPhotos.filter(p => p.type === 'profile');
    } else if (filter === 'experiences') {
      filteredPhotos = allGalleryPhotos.filter(p => p.type === 'experience');
    }

    renderGallery();
  }

  function openGalleryModal(index) {
    currentModalIndex = index;
    const photo = filteredPhotos[index];
    const modal = document.getElementById('gallery-modal');
    const img = document.getElementById('modal-image');
    const title = document.getElementById('modal-title');
    const info = document.getElementById('modal-info');

    img.src = getPhotoSrc(photo.src);
    img.onerror = () => { img.src = '/assets/Dev_Sanskriti_Vishwavidyalaya.png'; };
    title.textContent = photo.studentName;
    info.textContent = `${photo.organization} • ${photo.type === 'profile' ? 'Profile Photo' : 'Experience Photo'} (${currentModalIndex + 1} of ${filteredPhotos.length})`;

    modal.style.display = 'flex';
  }

  function closeGalleryModal() {
    document.getElementById('gallery-modal').style.display = 'none';
  }

  function nextGalleryImage() {
    currentModalIndex = (currentModalIndex + 1) % filteredPhotos.length;
    openGalleryModal(currentModalIndex);
  }

  function prevGalleryImage() {
    currentModalIndex = (currentModalIndex - 1 + filteredPhotos.length) % filteredPhotos.length;
    openGalleryModal(currentModalIndex);
  }

  // Close modal on Escape key
  document.addEventListener('keydown', (e) => {
    if (e.key === 'Escape') closeGalleryModal();
    if (e.key === 'ArrowRight') nextGalleryImage();
    if (e.key === 'ArrowLeft') prevGalleryImage();
  });
</script>
{% endblock %}
